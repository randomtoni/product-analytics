name: Release TS packages

on:
  push:
    tags:
      - 'ts-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4

      # pnpm must be installed before setup-node's pnpm cache. Version is read from
      # ts/package.json "packageManager" — the single source of truth (no second pin to drift).
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml

      # Persist turbo's local cache across releases so gates only rebuild what changed.
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: ts/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      # Guard: the tag drives the release name, but pnpm publishes whatever version each
      # package.json declares (and silently skips already-published versions). Without this,
      # tagging ts-v0.1.1 without bumping package.json is a green run that ships nothing.
      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ts-v}"
          for pkg in analytics-kit browser node react; do
            PKG_VERSION="$(node -p "require('./packages/$pkg/package.json').version")"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::packages/$pkg is $PKG_VERSION but tag $GITHUB_REF_NAME implies $TAG_VERSION — bump package.json before tagging"
              exit 1
            fi
          done
          echo "All four packages are at $TAG_VERSION"

      - name: Gates
        run: |
          pnpm turbo run build test typecheck lint
          pnpm neutrality-scan

      # Auth via pnpm's own trusted user-level config. pnpm 11 IGNORES env-expanded auth in a
      # project .npmrc (it could leak a committed secret), so write the token to the user config
      # with `pnpm config set` — the exact remedy pnpm's own warning points to. --access is
      # omitted deliberately: each package's publishConfig.access governs its own visibility, so a
      # future restricted package is never force-published public by a blanket CLI flag.
      - name: Publish
        run: |
          pnpm config set "//registry.npmjs.org/:_authToken" "$NODE_AUTH_TOKEN"
          pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
